name: cuda-ubu20
on:
  push:
    branches:
      - 'no'
  pull_request:
    branches:
      - 'no'
  workflow_dispatch:
    branches:
      - '*'
jobs:
  rmagine-cuda-ubuntu20:
    runs-on: ubuntu-20.04
    steps:
    - name: Deps (APT)
      run: sudo apt install -y libboost-dev libeigen3-dev libassimp-dev cmake 
    - name: Deps (CUDA)
      uses: Jimver/cuda-toolkit@v0.2.11
      id: cuda-toolkit
      with:
        cuda: '12.1.0'
    - name: Clone
      uses: actions/checkout@v4
      with:
        path: rmagine
    - name: Compile
      run: |
        cd rmagine
        mkdir build
        cd build
        cmake ..
        make
    - name: Test
      run: |
        cd rmagine
        cd build
        ./bin/rmagine_version
        make test