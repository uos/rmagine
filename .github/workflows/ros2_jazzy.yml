name: ros2_jazzy

on:
  push:
    branches:
      - ros-workflows
  pull_request:
    branches:
      - ros-workflows
  workflow_dispatch:
    branches:
      - '*'

jobs:
  jazzy:
    name: ros2-jazzy
    uses: ./.github/workflows/ros2_template.yml
    with:
      os: ubuntu-24.04
      ros_distro: jazzy
